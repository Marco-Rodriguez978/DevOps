name: CI HTML

on:
  push:
    branches:
      - main

jobs:
  validar-html:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar HTMLHint
        run: npm install -g htmlhint

      - name: Verificar HTML
        run: htmlhint index.html